<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Quiz Card</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, rgb(16, 16, 45), rgb(40, 40, 67));
        }

        .card {
            width: 750px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo-box {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid rgb(39, 39, 243);
            background: white;
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .center-text {
            text-align: center;
            flex: 1;
        }

        .center-text h1 {
            font-size: 30px;
            color: rgb(13, 13, 37);
            margin-bottom: 10px;
        }

        .center-text h2 {
            font-size: 20px;
            color: rgb(71, 71, 113);
        }

        .info {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 15px;
        }

        .info p {
            font-size: 20px;
            margin: 12px 0;
            color: rgb(34, 34, 55);
            font-weight: bold;
        }

        .highlight {
            color: rgb(30, 30, 237);
        }



        /* ENTER BUTTON */

        .enter-btn {
            display: block;
            margin: 30px auto 0;
            padding: 16px 50px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            background: red;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
        }

        .enter-btn:hover {
            background: darkred;
            transform: scale(1.08);
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="top">

            <!-- Left College Logo -->
            <div class="logo-box">
                <img src="c_logo.png" alt="College Logo">
            </div>

            <!-- Center Text -->
            <div class="center-text">
                <h1>Web Quiz Project</h1>
                <h2>Student Information Card</h2>
            </div>

            <!-- Right University Logo -->
            <div class="logo-box">
                <img src="g_logo.png" alt="University Logo">
            </div>

        </div>

        <div class="info">
            <p>Name : <span class="highlight">Afzaloddin Malek</span></p>

            <p>Enrollment No :
                <span class="highlight">241243131008</span>
            </p>


            <button class="enter-btn" onclick="openLogin()">
                ENTER
            </button>

            <script>

                function openLogin() {
                    window.location.href = "login.html";
                }

            </script>

        </div>

</body>

</html>
